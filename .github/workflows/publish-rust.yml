name: Publish ml-py to PyPI

on:
  push:
    tags:
      - "rust-v*"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
            rustflags: "-C target-cpu=x86-64-v2"
          - os: macos-13
            target: x86_64-apple-darwin
            rustflags: "-C target-cpu=x86-64-v2"
          - os: macos-latest
            target: aarch64-apple-darwin
            rustflags: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rustflags: "-C target-cpu=x86-64-v2"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux || 'auto' }}
          working-directory: al/py
        env:
          # Override .cargo/config.toml target-cpu=native — wheels must be portable.
          # x86-64-v2 = SSE4.2 baseline (2008+), safe for all modern x86 CPUs.
          # aarch64 has no equivalent flag — Apple Silicon baseline is already portable.
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: al/py/dist

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: al/py

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: al/py/dist

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
